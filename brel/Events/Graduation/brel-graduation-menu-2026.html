  /* Joining class names. Removes false/empty values */
  function cx(...classes) {
    return classes.filter(Boolean).join(" ");
  }

  /*----------------------STICKY HEADER----------------------*/




  /*----------------------RENDERS ONE NORMAL MENU ROW (NAME/DIETARY/PRICE/DESC)----------------------*/

  function MenuItem({ item }) {
    return (
      <div className="break-inside-avoid border-b border-black/20 py-4">
        {/* Top row: item name on the left, price on the right. */}
        <div className="grid grid-cols-[minmax(0,1fr)_max-content] gap-4">
          {/* Item name and optional dietary tag. */}
          <p className="m-0 font-extrabold tracking-wide text-[#1a1a1a]">
            {item.name}
            {item.dietary && (
              <span className="ml-2 whitespace-nowrap text-sm font-extrabold tracking-widest text-[#007a8d]">
                {item.dietary}
              </span>
            )}
          </p>

          {/* Item price. Kept nowrap so prices stay aligned and do not wrap onto multiple lines. */}
          <p className="m-0 whitespace-nowrap text-right font-semibold text-[#1a1a1a]">
            {item.price}
          </p>
        </div>

        {/* Optional description. New lines in desc become separate <p> lines. */}
        {item.desc && (
          <div className="mt-2 space-y-1 text-sm leading-relaxed text-[#1a1a1a]">
            {item.desc.split("\n").map((line, i) => (
              <p key={i} className="m-0">
                {line}
              </p>
            ))}
          </div>
        )}
      </div>
    );
  }

  /*----------------------RENDERS SUBHEADERS----------------------*/
  function Heading({ text }) {
    return (
      <h3
        style={{ columnSpan: "all", WebkitColumnSpan: "all" }}
        className="mb-4 mt-14 break-after-avoid text-xl font-extrabold uppercase tracking-wide text-[#007a8d] first:mt-0"
      >
        {text}
      </h3>
    );
  }



  /*----------------------DECIDES WHICH COMPONENT TO USE FOR EACH ITEM IN MENU_DATA BASED ON ITEM.TYPE----------------------*/
  function RenderBlock({ item, activeMenu }) {
    if (item.type === "heading") return <Heading text={item.text} />; // Subheading.
    if (item.type === "item") return <MenuItem item={item} />; // Normal menu row.

    // Dotted outline box, used for grouped fondue/raclette content.
    if (item.type === "box") {
      return (
        <div className="my-6 break-inside-avoid border-2 border-dotted border-[#007a8d] p-4">
          {item.items.map((child, i) => (
            <RenderBlock key={i} item={child} activeMenu={activeMenu} />
          ))}
        </div>
      );
    }

    return null;
  }
  /*----------------------RENDERS FULL MENU SECTION (SMALL / POUTINES / BIGS / BREADS ETC)----------------------*/

  function Section({ section, activeMenu }) {
    const id = `${activeMenu}-${section.id}`;

    return (
      <section id={id} className="pt-10">
        {/* Section title and horizontal rule. */}
        <div className="mb-8 text-center">
          <h2 className="text-3xl font-extrabold uppercase tracking-wide text-[#007a8d]">
            {section.title}
          </h2>
          <hr className="mt-5 border-black/20" />
        </div>

        {/* Menu content. One column on mobile, two columns on medium screens and above. */}
        <div
          style={{ columnFill: "balance" }}
          className="columns-1 gap-11 md:columns-2"
        >
          {section.items.map((item, i) => (
            <RenderBlock key={i} item={item} activeMenu={activeMenu} />
          ))}
        </div>
      </section>
    );
  }

  /*----------------------MAIN FOOD MENU APP---------------------*/
  function BrelMenu() {
    // Food only. No sticky navigation bar, no Food/Drinks/Kids tabs, no section links.
    const activeMenu = "food";
    const sections = MENU_DATA.food;
