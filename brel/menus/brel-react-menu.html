  /* Joining class names. Removes false/empty values */
  function cx(...classes) {
    return classes.filter(Boolean).join(" ");
  }

  /*----------------------STICKY HEADER----------------------*/

  /* Finds the height of the Squarespace header and stores it as a CSS variable. Creates sticky menu */
  function useHeaderOffset() {
    React.useEffect(() => {
      const setOffset = () => {
        /* all possible squarespace header selectors */
        const selectors = [
          "header.Header",
          "#header",
          'header[role="banner"]',
          ".sqs-site-frame .Header",
        ];
        let height = 0;

        /* Check each possible header and keep the tallest visible one */
        selectors.forEach((sel) => {
          const el = document.querySelector(sel);
          if (!el) return;
          const rect = el.getBoundingClientRect();
          if (rect.height > 0 && getComputedStyle(el).display !== "none")
            height = Math.max(height, rect.height);
        });

        /* Save the header height for CSS scroll calculations */
        document.documentElement.style.setProperty(
          "--ssHeaderH",
          height + "px",
        );
      };

      /* Run this once when the menu loads */
      setOffset();

      /* recalculate when the screen is resized */
      window.addEventListener("resize", setOffset);

      /* clean up the event listener if react ever unmounts this component */
      return () => window.removeEventListener("resize", setOffset);
    }, []);
  }

  /*----------------------SMOOTH SCROLLS TO SECTION----------------------*/

  function scrollToId(id) {
    const el = document.getElementById(id); // the target section/card
    const nav = document.getElementById("brel-menu-nav"); // sticky nav bar
    if (!el) return;

    const headerH =
      parseFloat(
        getComputedStyle(document.documentElement).getPropertyValue(
          "--ssHeaderH",
        ),
      ) || 0;
    const navH = nav ? nav.getBoundingClientRect().height : 0;
    const y =
      el.getBoundingClientRect().top + window.scrollY - headerH - navH - 18;

    window.scrollTo({ top: Math.max(0, y), behavior: "smooth" });
  }

  /*----------------------RENDERS ONE NORMAL MENU ROW (NAME/DIETARY/PRICE/DESC)----------------------*/

  function MenuItem({ item }) {
    return (
      <div className="break-inside-avoid border-b border-black/20 py-4">
        {/* Top row: item name on the left, price on the right. */}
        <div className="grid grid-cols-[minmax(0,1fr)_max-content] gap-4">
          {/* Item name and optional dietary tag. */}
          <p className="m-0 font-extrabold tracking-wide text-[#1a1a1a]">
            {item.name}
            {item.dietary && (
              <span className="ml-2 whitespace-nowrap text-sm font-extrabold tracking-widest text-[#007a8d]">
                {item.dietary}
              </span>
            )}
          </p>

          {/* Item price. Kept nowrap so prices stay aligned and do not wrap onto multiple lines. */}
          <p className="m-0 whitespace-nowrap text-right font-semibold text-[#1a1a1a]">
            {item.price}
          </p>
        </div>

        {/* Optional description. New lines in desc become separate <p> lines. */}
        {item.desc && (
          <div className="mt-2 space-y-1 text-sm leading-relaxed text-[#1a1a1a]">
            {item.desc.split("\n").map((line, i) => (
              <p key={i} className="m-0">
                {line}
              </p>
            ))}
          </div>
        )}
      </div>
    );
  }

  /*----------------------RENDERS SUBHEADERS----------------------*/
  function Heading({ text }) {
    return (
      <h3
        style={{ columnSpan: "all", WebkitColumnSpan: "all" }}
        className="mb-4 mt-14 break-after-avoid text-xl font-extrabold uppercase tracking-wide text-[#007a8d] first:mt-0"

    );
  }

  /*----------------------RENDERS PROMO CARDS----------------------*/

  function Promo({ item, activeMenu }) {
    const id = `${activeMenu}-${item.id}`;

    return (
      <div
        id={id}
        style={{ columnSpan: "all", WebkitColumnSpan: "all" }}
        className="my-8 break-inside-avoid scroll-mt-44 rounded-lg bg-[#007a8d] p-6 text-[#f6efe5] md:p-9"
      >
        {/* Promo image and text sit side-by-side on desktop and stack on mobile. */}
        <div className="grid items-center gap-6 md:grid-cols-2">
          {/* Optional promo image. */}
          {item.image && (
            <img
              className="mx-auto max-w-xs rounded-md"
              src={item.image}
              alt={item.alt || item.title || "Menu special"}
            />
          )}

          {/* Promo title and text lines. */}
          <div className="space-y-4 text-center">
            {item.title && (
              <h3 className="text-2xl font-extrabold">{item.title}</h3>

            {item.lines.map((line, i) => (
              <p
                key={i}

        {item.buttonText && (
          <div className="mt-8 text-center">

              className="inline-flex rounded-full border-2 border-[#f6efe5] px-6 py-3 text-sm font-extrabold uppercase tracking-wide text-[#f6efe5] no-underline hover:bg-[#f6efe5] hover:text-[#007a8d]"
              href={item.buttonHref || BOOKING_URL}

    );

  /*----------------------DECIDES WHICH COMPONENT TO USE FOR EACH ITEM IN MENU_DATA BASED ON ITEM.TYPE----------------------*/
  function RenderBlock({ item, activeMenu }) {
    if (item.type === "heading") return <Heading text={item.text} />; // Subheading.
    if (item.type === "item") return <MenuItem item={item} />; // Normal menu row.
    if (item.type === "promo")
      return <Promo item={item} activeMenu={activeMenu} />; // Promo card.

    // Dotted outline box, used for grouped fondue/raclette content.
    if (item.type === "box") {
      return (
        <div className="my-6 break-inside-avoid border-2 border-dotted border-[#007a8d] p-4">
          {item.items.map((child, i) => (
            <RenderBlock key={i} item={child} activeMenu={activeMenu} />
          ))}
        </div>
      );
    }

    return null;
  }
  /*----------------------RENDERS FULL MENU SECTION (SMALL / POUTINES / BIGS / BREADS ETC)----------------------*/

  function Section({ section, activeMenu }) {

            {section.title}
          </h2>
          <hr className="mt-5 border-black/20" />
        </div>

        {/* Menu content. One column on mobile, two columns on medium screens and above. */}
        <div
          style={{ columnFill: "balance" }}
          className="columns-1 gap-11 md:columns-2"
        >
          {section.items.map((item, i) => (
            <RenderBlock key={i} item={item} activeMenu={activeMenu} />
          ))}
        </div>
      </section>
    );
  }

  /*----------------------MAIN MENU APP CONTROLS STICKY NAV BAR, DROPDOWNS AND RENDERED SECTIONS----------------------*/
  function BrelMenu() {
    // Keep sticky nav offset aligned with the Squarespace header.
    useHeaderOffset();

    // Initial active tab. If URL contains ?menu=drinks or ?menu=kids, it opens that tab first. Defaults to food.
    const [activeMenu, setActiveMenu] = React.useState(() => {
      const param = new URLSearchParams(window.location.search).get("menu");
      return MENU_DATA[param] ? param : "food";
    });

    // Controls whether the Specials dropdown is open.
    const [specialsOpen, setSpecialsOpen] = React.useState(false);

    // Sections for the currently active menu.
    const sections = MENU_DATA[activeMenu] || MENU_DATA.food;

    // Build the Specials dropdown by finding all promo cards in the active menu.
    const specials = React.useMemo(() => {
      const list = [];
      sections.forEach((section) => {
        section.items.forEach((item) => {
          if (item.type === "promo" && item.id) list.push(item);
        });
      });
      return list;
    }, [sections]);

    // Update the URL when the active menu changes, e.g. ?menu=food, ?menu=drinks, ?menu=kids.
    React.useEffect(() => {
      const url = new URL(window.location.href);
      url.searchParams.set("menu", activeMenu);
      history.replaceState(null, "", url.toString());
      setSpecialsOpen(false); // Close Specials dropdown when changing menu.
    }, [activeMenu]);

    // Close the Specials dropdown when clicking elsewhere on the page.
    React.useEffect(() => {
      const close = () => setSpecialsOpen(false);
      document.addEventListener("click", close);
      return () => document.removeEventListener("click", close);
    }, []);

    return (
      // Main outer menu container. max-w-6xl keeps it from getting too wide; mx-auto centres it.
      <div className="w-full mx-auto max-w-6xl bg-[#f6efe5] px-4 pb-16 font-sans text-[#1a1a1a]">
        {/* Main page title. */}
        <h1 className="mb-5 text-center text-4xl font-extrabold text-[#007a8d]">
          Menus
        </h1>

        {/* Sticky nav block containing Food/Drinks/Kids toggle and section links. */}
        <div
          id="brel-menu-nav"
          className="sticky z-[9999] rounded-lg border-2 border-[#007a8d] bg-[#f9f3ea] px-4 py-6"
          style={{ top: "var(--ssHeaderH, 0px)" }}
        >
          {/* Food / Drinks / Kids segmented buttons. */}
          <div className="mb-5 flex justify-center">
            <div className="inline-grid grid-flow-col rounded-full border border-black/50 p-1">
              {Object.keys(MENU_DATA).map((key) => (
                <button
                  key={key}
                  type="button"
                  onClick={() => setActiveMenu(key)}
                  className={cx(
                    "rounded-full px-7 py-3 text-sm font-extrabold capitalize leading-none",
                    activeMenu === key && "outline outline-2 outline-[#007a8d]",
                  )}
                >
                  {key}
                </button>
              ))}
            </div>
          </div>

          {/* Horizontal section nav. Scrolls on mobile; wraps/centres on desktop. */}
          <nav className="relative flex gap-4 overflow-x-auto whitespace-nowrap px-2 text-sm font-extrabold uppercase text-[#007a8d] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden md:flex-wrap md:justify-center">
            {/* Specials dropdown appears only if the active menu contains promo cards. */}
            {specials.length > 0 && (
              <div
                className="relative inline-block"
                onClick={(e) => e.stopPropagation()}
              >
                <button
                  type="button"
                  onClick={() => setSpecialsOpen((v) => !v)}
                  className="underline decoration-[#007a8d]/50 decoration-2 underline-offset-4 hover:decoration-[#007a8d]"
                  aria-expanded={specialsOpen}
                >
                  Specials ▾
                </button>

                {/* Dropdown panel for promo cards. Fixed positioning helps it avoid being clipped by the sticky nav. */}
                {specialsOpen && (
                  <div className="fixed left-1/2 z-[20000] mt-3 min-w-56 -translate-x-1/2 rounded-xl border-2 border-[#007a8d]/40 bg-white p-3 text-left normal-case text-[#1a1a1a] shadow-xl">
                    {specials.map((item) => (
                      <button
                        key={item.id}
                        type="button"
                        onClick={() => {
                          setSpecialsOpen(false);
                          scrollToId(`${activeMenu}-${item.id}`);
                        }}
                        className="block w-full rounded-lg px-3 py-2 text-left font-extrabold hover:bg-[#007a8d]/10"
                      >
                        {item.alt || item.title || item.id.replaceAll("-", " ")}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* Section buttons are generated from the active menu sections. */}
            {sections.map((section) => (
              <button
                key={section.id}
                type="button"
                onClick={() => scrollToId(`${activeMenu}-${section.id}`)}
                className="underline decoration-[#007a8d]/50 decoration-2 underline-offset-4 hover:decoration-[#007a8d]"
              >
                {section.label}
              </button>
            ))}
          </nav>
        </div>

        {/* Actual menu sections rendered below the sticky nav. */}
        <div className="mt-6">
          {sections.map((section) => (
            <Section
              key={section.id}
              section={section}
              activeMenu={activeMenu}
            />
          ))}
        </div>
      </div>
    );
  }

  /*----------------------STARTS REACT APP BY RENDERING BRELMENU INSIDE BREL REACT MENU DIV----------------------*/
  ReactDOM.createRoot(document.getElementById("brel-react-menu")).render(
    <BrelMenu />,
  );
</script>
